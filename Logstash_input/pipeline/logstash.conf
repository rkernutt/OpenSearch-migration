# Environment variables are substituted at startup (see ../docker-compose.yml, repo-root .env).
# Required: SOURCE_OPENSEARCH_HOST, SOURCE_OPENSEARCH_USER, SOURCE_OPENSEARCH_PASSWORD,
#           LOGSTASH_SOURCE_INDEX, LOGSTASH_DEST_INDEX, ELASTIC_CLOUD_ID, ELASTIC_CLOUD_AUTH
# (API-key variant: pipeline/logstash_api_key.conf + compose profile apikey)

input {
  opensearch {
    hosts => "${SOURCE_OPENSEARCH_HOST}"
    user => "${SOURCE_OPENSEARCH_USER}"
    password => "${SOURCE_OPENSEARCH_PASSWORD}"
    index => "${LOGSTASH_SOURCE_INDEX}"
    # Override by mounting a custom pipeline file; keep JSON on one line.
    query => '{"query":{"match_all":{}}}'
  }
}

filter {
  mutate {
    remove_field => [ "@version" ]
  }
}

output {
  elasticsearch {
    cloud_id => "${ELASTIC_CLOUD_ID}"
    cloud_auth => "${ELASTIC_CLOUD_AUTH}"
    index => "${LOGSTASH_DEST_INDEX}"
    manage_template => false
    ilm_enabled => false
  }
}
