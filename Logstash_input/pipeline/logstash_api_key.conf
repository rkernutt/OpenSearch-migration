# Use when your Elastic destination is configured with an API key instead of cloud_auth.
# Run: docker compose -f docker-compose.yml --profile apikey up --build
# Required .env: SOURCE_OPENSEARCH_* , LOGSTASH_SOURCE_INDEX, DEST_ELASTIC_HOST,
#                DEST_ELASTIC_API_KEY , LOGSTASH_DEST_INDEX

input {
  opensearch {
    hosts => "${SOURCE_OPENSEARCH_HOST}"
    user => "${SOURCE_OPENSEARCH_USER}"
    password => "${SOURCE_OPENSEARCH_PASSWORD}"
    index => "${LOGSTASH_SOURCE_INDEX}"
    query => '{"query":{"match_all":{}}}'
  }
}

filter {
  mutate {
    remove_field => [ "@version" ]
  }
}

output {
  elasticsearch {
    hosts => ["${DEST_ELASTIC_HOST}"]
    api_key => "${DEST_ELASTIC_API_KEY}"
    index => "${LOGSTASH_DEST_INDEX}"
    manage_template => false
    ilm_enabled => false
    ssl_verification_mode => full
  }
}
