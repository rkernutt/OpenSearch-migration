# Use this config when Logstash runs in AWS and talks to a local proxy that forwards
# to Amazon OpenSearch Service with SigV4. Replace localhost:9200 with your proxy
# address if different. The proxy must accept the same OpenSearch HTTP API and
# sign requests to the real OpenSearch domain using IAM.
input {
    opensearch {
        hosts => 'http://localhost:9200'
        user => 'proxy_user'
        password => 'proxy_password'
        index => 'source_index_name'
        query => '{ "query": {"match_all": {}} }'
    }
}
filter {
    mutate {
        remove_field => [ "@version" ]
        remove_field => [ "@timestamp" ]
    }
}
output {
    elasticsearch {
        cloud_id => 'elastic_cloud_id_from_deployment'
        cloud_auth => 'username:password'
        index => 'targetindexname'
    }
}
